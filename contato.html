<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato | Larissa Pinheiro</title>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@400;600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style-base.css">
  <link rel="stylesheet" href="css/style-contato.css">
</head>

<body>

  <header class="header">
    <div class="header-left">
      <img src="assets/icons/woman.svg" alt="logo" class="logo">

      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="index.html#projetos">Projetos</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
      </nav>
    </div>

    <div class="header-right">
      <a href="index-en.html" aria-label="English">
        <img src="assets/icons/language.svg" alt="idioma">
      </a>

      <a href="https://www.linkedin.com/in/larissapinheiroz/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <img src="assets/icons/linkedin.svg" alt="linkedin">
      </a>
    </div>
  </header>

  <main>
    <section class="section contato">
      <div class="container contato-layout">

        <!-- COLUNA ESQUERDA -->
        <div class="contato-info">
          <div class="contato-item">
            <h2>Email</h2>
            <p>larissapinheiroz@gmail.com</p>
          </div>

          <div class="contato-item">
            <h2>Telefone</h2>
            <p>+55 (11) 96207-2527</p>
          </div>

          <div class="contato-item">
            <h2>Currículo</h2>

            <a href="assets/docs/curriculo-larissa-pinheiro.pdf" target="_blank" rel="noopener noreferrer" class="curriculo-link">
              <span>Ver meu Currículo</span>
              <img src="assets/icons/external-link.svg" alt="">
            </a>
          </div>
        </div>

        <!-- COLUNA DIREITA -->
        <div class="contato-form-wrap">
          <div class="contato-top">
            <h2>Contato</h2>
            <p>Vamos trabalhar juntos para construir algo grandioso.</p>
          </div>

          <form class="contato-form" action="#" method="post">
            <div class="field">
              <label for="nome">Nome</label>
              <input type="text" id="nome" name="nome">
            </div>

            <div class="field">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email">
            </div>

            <div class="field">
              <label for="telefone">Telefone</label>
              <input type="tel" id="telefone" name="telefone">
            </div>

            <div class="field field-message">
              <label for="mensagem">Mensagem</label>
              <textarea id="mensagem" name="mensagem"></textarea>
            </div>

            <button type="submit" class="contato-button">Entre em contato</button>
          </form>
        </div>

      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-left">
      Portfolio © 2026 Larissa Pinheiro. Todos os direitos reservados.
    </div>

    <div class="footer-center">
      <img src="assets/icons/woman.svg" alt="logo">
    </div>

    <div class="footer-right">
      Contact
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
